name: "Default Sprint Ceremony"
version: "3.0.0"
description: |
  v3 ceremony flow — sprint integrity model.
  Research → Groom → Execute flow sequentially (no inter-step gates).
  Code judge ALWAYS runs — evaluates mission progress, not just pass/fail.
  Deploy chain is conditional (only if judge says deploy_ready).
  Retro ALWAYS runs — the learning loop is the moat.
  Sprints never fail. They complete with whatever work got done.

nodes:
  - key: source
    node_type: source
    label: "Epic Context"
    config: {}

  - key: research
    node_type: harness
    label: "External Research"
    config:
      model: sonnet
      effort: medium
      budget_usd: 1.5
      chrome: false
      heartbeat_timeout_secs: 180
      max_turns: 15
      agent: researcher
      system_prompt: |
        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}

        Product Brief:
        {{product.brief}}

        You are a planning-tier research agent. You make strategic decisions about
        what external intelligence the team needs, then gather it.
      prompt: |
        Review the stories for epic {{epic.code}} and DECIDE what research is needed:
        {{stories}}

        Intent: {{epic.intent}}

        TRIAGE — for each story, decide ONE of:
        A) NO RESEARCH — story is internal (refactoring, CLI flags, bug fixes, plumbing, tests)
        B) WEB RESEARCH — story needs knowledge about external APIs, libraries, standards, protocols
        C) COMMITTEE REVIEW — story involves architecture decisions, design trade-offs, or strategy

        COMMITTEE REVIEW PROCESS (for option C):
        Convene a virtual panel of 3 domain experts whose perspectives create productive tension.
        Pick from: Security, DevOps, DX, Product, Architecture, Performance, Data, Testing, UX, Business.
        For each expert: (1) Challenge an assumption, (2) Share domain-specific insight, (3) Give a concrete recommendation.
        Experts MUST disagree with each other where domains conflict.
        Synthesize a verdict table with actionable decisions.

        RULES:
        - If ALL stories need no research → output "No research needed" and stop (1-2 turns max)
        - If .epic-runner/research/{{epic.code}}/findings.md exists → READ it first, AUGMENT don't redo
        - Write all findings (web + committee) to .epic-runner/research/{{epic.code}}/findings.md
        - Only research stories that DON'T already have acceptance_criteria populated
        - Output ONLY the file path you wrote to, or "No research needed."

  - key: groom
    node_type: harness
    label: "Groom (DoR + ACs)"
    config:
      model: sonnet
      effort: medium
      budget_usd: 2.0
      chrome: false
      heartbeat_timeout_secs: 240
      max_turns: 15
      agent: groomer
      system_prompt: |
        Grooming stories for epic {{epic.code}}.

        Product Brief:
        {{product.brief}}

        Project conventions (from CLAUDE.md):
        {{repo.claude_md}}
      prompt: |
        Groom the backlog stories for epic {{epic.code}}.
        Stories: {{stories}}

        SKIP stories that already have acceptance_criteria populated — they were groomed in a previous sprint. Only re-groom if the judge explicitly requested it.

        Research findings are at .epic-runner/research/{{epic.code}}/findings.md — read that file for external context (libraries, best practices, prior art).

        You are responsible for codebase exploration. Find relevant files, patterns, and line numbers for each story.

        For each story that NEEDS grooming:
        1. Explore the codebase — find specific files and line numbers for modification points
        2. Add specific, testable acceptance criteria (Given/When/Then)
        3. Estimate story points (1/2/3/5/8)
        4. List dependencies between stories
        5. Define test plan (what command verifies it works)

        Output ALL stories (groomed + already-groomed) as JSON array. For already-groomed stories, include their existing data unchanged. Each story object MUST include the original "id" field so results can be written back to the database.

  - key: execute
    node_type: loop
    label: "Supervised Execute"
    config:
      model: opus
      effort: high
      budget_usd: 10.0
      chrome: true
      heartbeat_timeout_secs: 300
      max_turns: 80
      loop_max: 5
      rubber_duck_after: 2
      per_story: true
      agent: builder
      system_prompt: |
        Executing story for sprint {{sprint.number}} of epic {{epic.code}}.
        Intent: {{epic.intent}}

        Product Brief:
        {{product.brief}}

        Project conventions:
        {{repo.claude_md}}

        {{previous_learnings}}

        Your story:
        {{story}}

        All sprint stories (for dependency context):
        {{stories}}
      prompt: |
        Execute this story for sprint {{sprint.number}} of epic {{epic.code}}:

        {{story}}

        The story has acceptance_criteria, tasks, and dependencies already populated
        from planning. Use those directly — they are the source of truth.

        Research context (if any) is at .epic-runner/research/{{epic.code}}/findings.md

        Implement all tasks, verify all acceptance criteria, then commit.
        Report your results as structured JSON (see builder agent instructions).

  - key: judge_code
    node_type: agent
    label: "Code Judge (mission progress)"
    always_run: true
    config:
      model: sonnet
      effort: medium
      budget_usd: 2.0
      chrome: false
      heartbeat_timeout_secs: 180
      max_turns: 12
      agent: code-judge
      system_prompt: |
        Judging sprint {{sprint.number}} of epic {{epic.code}}.
        Intent: {{epic.intent}}
        Success criteria: {{epic.success_criteria}}

        Product Brief:
        {{product.brief}}

        Product Definition of Done:
        {{product.definition_of_done}}

        Project conventions:
        {{repo.claude_md}}
      prompt: |
        Evaluate the mission progress for sprint {{sprint.number}} of epic {{epic.code}}.

        Stories (with structured plans, tasks, and ACs):
        {{stories}}

        Ceremony results so far:
        {{ceremony_results_json}}

        For EACH story: verify its acceptance_criteria are satisfied and its tasks are done.

        Output structured JSON with ALL fields:
        1. mission_progress (0-100%): How much of the epic intent is now satisfied?
        2. stories_completed: List of story CODES whose ACs are all verified
        3. stories_to_regroom: Story CODES where the plan was wrong and need re-planning
        4. delta_stories: NEW stories discovered during this sprint
        5. deploy_ready (bool): Is the code ready to deploy?
        6. intent_satisfied (bool): Is the full epic mission complete?
        7. next_sprint_goal (string): Refined goal for the NEXT sprint based on what was accomplished and what remains

  - key: gate_deploy
    node_type: gate
    label: "Deploy Ready?"
    config:
      gate_field: status
      gate_expect: completed

  - key: deploy_standby
    node_type: deploy
    label: "Deploy (Blue-Green)"
    config:
      deploy_app_id: "${DEPLOY_APP_ID}"
      deploy_timeout_secs: 300
      deploy_production_url: "${DEPLOY_PRODUCTION_URL}"

  - key: gate_deploy_ok
    node_type: gate
    label: "Deploy OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: judge_ab
    node_type: agent
    label: "A/B Judge (Chrome)"
    config:
      model: sonnet
      effort: medium
      budget_usd: 3.0
      chrome: true
      heartbeat_timeout_secs: 300
      max_turns: 20
      agent: ab-judge
      system_prompt: |
        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}
        Success criteria: {{epic.success_criteria}}

        {{deploy_output}}
      prompt: |
        A/B judge sprint {{sprint.number}} of epic {{epic.code}}.

        The code has been deployed to a STANDBY slot (not yet serving traffic).
        Compare the standby deployment against the live production version.
        Both should be accessible via their respective URLs.

        Ceremony results so far:
        {{ceremony_results_json}}

        Output your verdict as JSON. Set "promote": true to approve the swap.

  - key: gate_ab
    node_type: gate
    label: "A/B Approved?"
    config:
      gate_field: status
      gate_expect: completed

  - key: promote
    node_type: promote
    label: "Promote Standby → Primary"
    config:
      deploy_app_id: "${DEPLOY_APP_ID}"

  - key: merge_results
    node_type: merge
    label: "Collect Results"
    always_run: true
    config: {}

  - key: sm_retro
    node_type: harness
    label: "Scrum Master Retro"
    always_run: true
    config:
      model: sonnet
      effort: low
      budget_usd: 1.0
      chrome: false
      heartbeat_timeout_secs: 180
      max_turns: 8
      resume_stories: true
      agent: scrum-master
      system_prompt: |
        Sprint {{sprint.number}} retro for {{epic.code}}.
        You are resuming this story's builder session to interview
        the builder about what happened during execution.
      prompt: |
        Sprint {{sprint.number}} per-story retro for {{epic.code}}.

        This is a retro interview for story: {{story}}

        Ceremony results (structured):
        {{ceremony_results_json}}

        Supervisor decisions: {{supervisor_decisions}}

        Interview: What went well in this story? What caused friction?
        What patterns should we codify? Any discovered work items?
        Be specific — cite files, decisions, and costs.
        Output structured JSON retro for this story.

  - key: output
    node_type: output
    label: "Sprint Result"
    config: {}

edges:
  # Sequential flow — no gates between research/groom/execute
  - source: source
    target: research
  - source: research
    target: groom
  - source: groom
    target: execute

  # Judge ALWAYS runs after execute (always_run: true)
  - source: execute
    target: judge_code

  # Deploy chain — conditional on judge saying code is ready
  - source: judge_code
    target: gate_deploy
  - source: gate_deploy
    target: deploy_standby
    handle: pass
  - source: gate_deploy
    target: merge_results
    handle: fail
  - source: deploy_standby
    target: gate_deploy_ok
  - source: gate_deploy_ok
    target: judge_ab
    handle: pass
  - source: gate_deploy_ok
    target: merge_results
    handle: fail
  - source: judge_ab
    target: gate_ab
  - source: gate_ab
    target: promote
    handle: pass
  - source: gate_ab
    target: merge_results
    handle: fail
  - source: promote
    target: merge_results

  # Retro ALWAYS runs — the learning loop is the moat
  - source: merge_results
    target: sm_retro
  - source: sm_retro
    target: output
