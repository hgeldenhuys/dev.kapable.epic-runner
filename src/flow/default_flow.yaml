name: "Default Sprint Ceremony"
version: "2.3.0"
description: |
  Full autonomous ceremony with A/B blue-green deploy:
  research → groom → execute → code judge → deploy to STANDBY → A/B judge → promote.
  Code judge (pre-deploy): reviews diff, runs build, verifies quality.
  A/B judge (post-deploy): Chrome-based comparison of standby vs live production.
  If judge passes: promote standby to primary (zero-downtime swap).
  If judge fails: standby stays dormant (automatic rollback — no action needed).
  Gates short-circuit on failure. SM retro always runs.
  v2.3: Dedicated agent definitions per ceremony role.

nodes:
  - key: source
    node_type: source
    label: "Epic Context"
    config: {}

  - key: research
    node_type: harness
    label: "Research (read-only)"
    config:
      model: sonnet
      effort: low
      budget_usd: 1.0
      chrome: false
      heartbeat_timeout_secs: 180
      agent: researcher
      system_prompt: |
        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}
      prompt: |
        Research the codebase for epic {{epic.code}}. Find all relevant files,
        existing patterns, dependencies, and potential blockers.
        Project conventions (from CLAUDE.md):
        {{repo.claude_md}}

  - key: gate_research
    node_type: gate
    label: "Research OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: groom
    node_type: harness
    label: "Groom (DoR + ACs)"
    config:
      model: sonnet
      effort: low
      budget_usd: 1.0
      chrome: false
      heartbeat_timeout_secs: 180
      agent: groomer
      system_prompt: |
        Grooming stories for epic {{epic.code}}.
      prompt: |
        Groom the backlog stories for epic {{epic.code}}:
        {{input}}

        Research findings above. For each story:
        1. Add specific, testable acceptance criteria (Given/When/Then)
        2. Add file paths and line numbers from the research
        3. Estimate story points (1/2/3/5/8)
        4. List dependencies between stories
        5. Define test plan (what command verifies it works)
        Output groomed stories as JSON array.

  - key: gate_groom
    node_type: gate
    label: "Groom OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: execute
    node_type: loop
    label: "Supervised Execute"
    config:
      model: opus
      effort: high
      budget_usd: 10.0
      chrome: true
      heartbeat_timeout_secs: 300
      loop_max: 5
      rubber_duck_after: 2
      agent: builder
      system_prompt: |
        Executing sprint {{sprint.number}} of epic {{epic.code}}.
        Intent: {{epic.intent}}

        Project conventions:
        {{repo.claude_md}}

        {{previous_learnings}}

        Stories for this sprint:
        {{stories}}
      prompt: |
        Execute all stories for sprint {{sprint.number}} of epic {{epic.code}}.
        Groomed story details from previous ceremony:
        {{input}}

        For each story: implement, test, commit. Report what you did per story.

  - key: gate_execute
    node_type: gate
    label: "No Impediment?"
    config:
      gate_field: impediment_raised
      gate_expect: "false"

  - key: judge_code
    node_type: agent
    label: "Code Judge (build + diff)"
    config:
      model: sonnet
      effort: medium
      budget_usd: 2.0
      chrome: false
      heartbeat_timeout_secs: 180
      agent: code-judge
      system_prompt: |
        Judging sprint {{sprint.number}} of epic {{epic.code}}.

        Project conventions:
        {{repo.claude_md}}
      prompt: |
        Review the code changes for sprint {{sprint.number}} of epic {{epic.code}}.
        Verify the build passes and the code is ready to deploy.
        Ceremony results so far:
        {{ceremony_results_json}}

  - key: gate_code
    node_type: gate
    label: "Code OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: deploy_standby
    node_type: deploy
    label: "Deploy to Standby"
    config:
      deploy_app_id: "${DEPLOY_APP_ID}"
      deploy_timeout_secs: 300
      deploy_slot: standby
      deploy_production_url: "${DEPLOY_PRODUCTION_URL}"
      deploy_standby_url: "${DEPLOY_STANDBY_URL}"

  - key: gate_deploy
    node_type: gate
    label: "Deploy OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: judge_ab
    node_type: agent
    label: "A/B Judge (Chrome)"
    config:
      model: sonnet
      effort: medium
      budget_usd: 3.0
      chrome: true
      heartbeat_timeout_secs: 300
      agent: ab-judge
      system_prompt: |
        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}
        Success criteria: {{epic.success_criteria}}

        {{deploy_output}}
      prompt: |
        A/B judge sprint {{sprint.number}} of epic {{epic.code}}.

        The code has been deployed to a STANDBY slot (not yet serving traffic).
        Compare the standby deployment against the live production version.
        Both should be accessible via their respective URLs.

        Ceremony results so far:
        {{ceremony_results_json}}

        Output your verdict as JSON. Set "promote": true to approve the swap.

  - key: gate_ab
    node_type: gate
    label: "A/B Approved?"
    config:
      gate_field: status
      gate_expect: completed

  - key: promote
    node_type: promote
    label: "Promote Standby → Primary"
    config:
      deploy_app_id: "${DEPLOY_APP_ID}"
      deploy_slot: standby

  - key: merge_results
    node_type: merge
    label: "Collect Results"
    always_run: true
    config: {}

  - key: sm_retro
    node_type: harness
    label: "Scrum Master Retro"
    always_run: true
    config:
      model: sonnet
      effort: low
      budget_usd: 2.0
      chrome: false
      heartbeat_timeout_secs: 180
      agent: scrum-master
      system_prompt: |
        Sprint {{sprint.number}} retro for {{epic.code}}.
      prompt: |
        Sprint {{sprint.number}} retro for {{epic.code}}.

        Ceremony results (structured):
        {{ceremony_results_json}}

        Supervisor decisions: {{supervisor_decisions}}

        Analyze: what went well, what caused friction, patterns to codify,
        discovered work items. Be specific — cite node names and costs.
        Output structured JSON retro.

  - key: output
    node_type: output
    label: "Sprint Result"
    config: {}

edges:
  - source: source
    target: research
  - source: research
    target: gate_research
  - source: gate_research
    target: groom
    handle: pass
  - source: gate_research
    target: merge_results
    handle: fail
  - source: groom
    target: gate_groom
  - source: gate_groom
    target: execute
    handle: pass
  - source: gate_groom
    target: merge_results
    handle: fail
  - source: execute
    target: gate_execute
  - source: gate_execute
    target: judge_code
    handle: pass
  - source: gate_execute
    target: merge_results
    handle: fail
  - source: judge_code
    target: gate_code
  - source: gate_code
    target: deploy_standby
    handle: pass
  - source: gate_code
    target: merge_results
    handle: fail
  - source: deploy_standby
    target: gate_deploy
  - source: gate_deploy
    target: judge_ab
    handle: pass
  - source: gate_deploy
    target: merge_results
    handle: fail
  - source: judge_ab
    target: gate_ab
  - source: gate_ab
    target: promote
    handle: pass
  - source: gate_ab
    target: merge_results
    handle: fail
  - source: promote
    target: merge_results
  - source: merge_results
    target: sm_retro
  - source: sm_retro
    target: output
