name: "Default Sprint Ceremony"
version: "2.0.0"
description: |
  Full autonomous ceremony: research → groom → execute → deploy → judge (production).
  Gates short-circuit on failure. Deploy merges worktree → main, pushes, triggers
  Connect App Pipeline. Judge verifies in production via Chrome.
  SM retro always runs. Two-phase judgment: code quality + production verification.

nodes:
  - key: source
    node_type: source
    label: "Epic Context"
    config: {}

  - key: research
    node_type: harness
    label: "Research (read-only)"
    config:
      model: sonnet
      effort: high
      budget_usd: 1.0
      chrome: false
      heartbeat_timeout_secs: 180
      allowed_tools:
        - Read
        - Glob
        - Grep
        - "Bash(git *)"
        - "Bash(ls *)"
        - WebSearch
        - WebFetch
      system_prompt: |
        You are a research agent. Read-only. Do NOT edit files.
        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}

        Output ONLY valid JSON matching this schema:
        {
          "files": ["path/to/relevant/file.rs:42"],
          "patterns": ["Pattern description with file references"],
          "dependencies": ["External dep or internal module dependency"],
          "blockers": ["Potential blocker description"],
          "conventions": ["Key convention from CLAUDE.md that applies"]
        }
      prompt: |
        Research the codebase for epic {{epic.code}}. Find all relevant files,
        existing patterns, dependencies, and potential blockers.
        Project conventions (from CLAUDE.md):
        {{repo.claude_md}}

  - key: gate_research
    node_type: gate
    label: "Research OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: groom
    node_type: harness
    label: "Groom (DoR + ACs)"
    config:
      model: sonnet
      effort: high
      budget_usd: 1.0
      chrome: false
      heartbeat_timeout_secs: 180
      system_prompt: |
        You are a scrum master grooming stories for epic {{epic.code}}.
        Apply Definition of Ready:
        - Feature parity checked against existing code
        - Auth model specified (if applicable)
        - Acceptance criteria describe real user scenarios
        - Dependencies identified
        - Test plan defined
        - Scope bounded (completable in one session)

        Output ONLY valid JSON array matching this schema:
        [
          {
            "id": "story-uuid",
            "title": "Story title",
            "acceptance_criteria": ["AC 1: Given X, When Y, Then Z"],
            "file_paths": ["src/path/to/file.rs:42"],
            "points": 3,
            "dependencies": ["other-story-id or blocker"],
            "test_plan": "How to verify this story"
          }
        ]
      prompt: |
        Groom the backlog stories for epic {{epic.code}}:
        {{input}}

        Research findings above. For each story:
        1. Add specific, testable acceptance criteria (Given/When/Then)
        2. Add file paths and line numbers from the research
        3. Estimate story points (1/2/3/5/8)
        4. List dependencies between stories
        5. Define test plan (what command verifies it works)
        Output groomed stories as JSON array.

  - key: gate_groom
    node_type: gate
    label: "Groom OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: execute
    node_type: loop
    label: "Supervised Execute"
    config:
      model: opus
      effort: max
      budget_usd: 10.0
      chrome: true
      heartbeat_timeout_secs: 300
      loop_max: 5
      rubber_duck_after: 2
      system_prompt: |
        You are a senior developer executing sprint {{sprint.number}} of epic {{epic.code}}.
        Intent: {{epic.intent}}

        Project conventions:
        {{repo.claude_md}}

        Definition of Done — you MUST satisfy before finishing:
        - bun run build passes (zero errors)
        - All tests pass
        - Commit after each completed story
        - Test in Chrome MCP — verify the feature works visually

        {{previous_learnings}}

        Rules:
        - Execute autonomously — no confirmations
        - Run tests after EVERY change, not just at the end
        - If blocked by another epic, say exactly: 'blocked by <EPIC_CODE>'
        - If a test fails, fix it before moving on
        - Commit your work with descriptive messages

        Stories for this sprint:
        {{stories}}
      prompt: |
        Execute all stories for sprint {{sprint.number}} of epic {{epic.code}}.
        Groomed story details from previous ceremony:
        {{input}}

        For each story: implement, test, commit. Report what you did per story.

  - key: gate_execute
    node_type: gate
    label: "No Impediment?"
    config:
      gate_field: impediment_raised
      gate_expect: "false"

  - key: deploy
    node_type: deploy
    label: "Deploy to Production"
    config:
      deploy_app_id: "${DEPLOY_APP_ID}"
      deploy_timeout_secs: 300

  - key: gate_deploy
    node_type: gate
    label: "Deploy OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: judge
    node_type: agent
    label: "Production Judge (Chrome)"
    config:
      model: sonnet
      effort: high
      budget_usd: 3.0
      chrome: true
      heartbeat_timeout_secs: 300
      system_prompt: |
        You are an independent judge evaluating whether this sprint's work is
        visible and working IN PRODUCTION. You are NOT reviewing code — you are
        an end user testing the deployed application.

        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}
        Success criteria: {{epic.success_criteria}}

        INSTRUCTIONS:
        1. Open the production URL in Chrome
        2. Navigate to the relevant pages
        3. Take screenshots as evidence
        4. Verify each success criterion against the LIVE application
        5. Test user interactions (clicks, navigation, forms)
        6. Check for visual regressions (broken layouts, missing data)

        Output ONLY valid JSON:
        {
          "intent_satisfied": bool,
          "confidence": 0.0-1.0,
          "criteria_results": [
            {"criterion": "...", "met": bool, "evidence": "what you saw"}
          ],
          "summary": "Overall assessment",
          "evidence": ["screenshot descriptions"],
          "issues_found": ["Any bugs or regressions spotted"]
        }
      prompt: |
        Judge sprint {{sprint.number}} of epic {{epic.code}}.

        The code has been deployed to production. Open the app in Chrome and
        verify that the sprint's changes are live and working correctly.
        Test as an end user — not as a code reviewer.

        Ceremony results so far:
        {{ceremony_results_json}}

        Output your verdict as JSON.

  - key: merge_results
    node_type: merge
    label: "Collect Results"
    always_run: true
    config: {}

  - key: sm_retro
    node_type: harness
    label: "Scrum Master Retro"
    always_run: true
    config:
      model: sonnet
      effort: high
      budget_usd: 2.0
      chrome: false
      heartbeat_timeout_secs: 180
      system_prompt: |
        You are the Scrum Master observer for epic {{epic.code}}.

        Output ONLY valid JSON matching this schema:
        {
          "went_well": ["What worked and should be repeated"],
          "friction_points": ["What caused delays or frustration"],
          "action_items": ["Concrete improvement to make"],
          "discovered_work": ["New backlog items found during execution"],
          "observations": [
            {
              "category": "process|technical|quality|velocity",
              "description": "What was observed",
              "severity": "low|medium|high",
              "action_item": "What to do about it"
            }
          ],
          "patterns_to_codify": ["Convention that should become a rule"],
          "sprint_health": "healthy|strained|failing"
        }
      prompt: |
        Sprint {{sprint.number}} retro for {{epic.code}}.

        Ceremony results (structured):
        {{ceremony_results_json}}

        Supervisor decisions: {{supervisor_decisions}}

        Analyze: what went well, what caused friction, patterns to codify,
        discovered work items. Be specific — cite node names and costs.
        Output structured JSON retro.

  - key: output
    node_type: output
    label: "Sprint Result"
    config: {}

edges:
  - source: source
    target: research
  - source: research
    target: gate_research
  - source: gate_research
    target: groom
    handle: pass
  - source: gate_research
    target: merge_results
    handle: fail
  - source: groom
    target: gate_groom
  - source: gate_groom
    target: execute
    handle: pass
  - source: gate_groom
    target: merge_results
    handle: fail
  - source: execute
    target: gate_execute
  - source: gate_execute
    target: deploy
    handle: pass
  - source: gate_execute
    target: merge_results
    handle: fail
  - source: deploy
    target: gate_deploy
  - source: gate_deploy
    target: judge
    handle: pass
  - source: gate_deploy
    target: merge_results
    handle: fail
  - source: judge
    target: merge_results
  - source: merge_results
    target: sm_retro
  - source: sm_retro
    target: output
