name: "Default Sprint Ceremony"
version: "3.0.0"
description: |
  v3 ceremony flow — sprint integrity model.
  Research → Groom → Execute flow sequentially (no inter-step gates).
  Code judge ALWAYS runs — evaluates mission progress, not just pass/fail.
  Deploy chain is conditional (only if judge says deploy_ready).
  Retro ALWAYS runs — the learning loop is the moat.
  Sprints never fail. They complete with whatever work got done.

nodes:
  - key: source
    node_type: source
    label: "Epic Context"
    config: {}

  - key: research
    node_type: harness
    label: "External Research"
    config:
      model: haiku
      effort: low
      budget_usd: 0.5
      chrome: false
      heartbeat_timeout_secs: 180
      max_turns: 15
      agent: researcher
      system_prompt: |
        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}
      prompt: |
        Research external sources for epic {{epic.code}}: "{{epic.title}}"
        Intent: {{epic.intent}}

        Search the web for relevant patterns, libraries, best practices, and prior art.
        Look at how other tools/products solve the same problem.
        Check for existing standards or conventions to follow.

        Write your findings to .epic-runner/research/{{epic.code}}/findings.md
        If that file already exists from a previous sprint, read it first and augment — don't redo work.

        Output ONLY the file path you wrote to.

  - key: groom
    node_type: harness
    label: "Groom (DoR + ACs)"
    config:
      model: sonnet
      effort: low
      budget_usd: 1.0
      chrome: false
      heartbeat_timeout_secs: 180
      max_turns: 10
      agent: groomer
      system_prompt: |
        Grooming stories for epic {{epic.code}}.
        Project conventions (from CLAUDE.md):
        {{repo.claude_md}}
      prompt: |
        Groom the backlog stories for epic {{epic.code}}.

        Research findings are at .epic-runner/research/{{epic.code}}/findings.md — read that file for external context (libraries, best practices, prior art).

        You are responsible for codebase exploration. Find relevant files, patterns, and line numbers for each story.

        For each story:
        1. Explore the codebase — find specific files and line numbers for modification points
        2. Add specific, testable acceptance criteria (Given/When/Then)
        3. Estimate story points (1/2/3/5/8)
        4. List dependencies between stories
        5. Define test plan (what command verifies it works)
        Output groomed stories as JSON array.

  - key: execute
    node_type: loop
    label: "Supervised Execute"
    config:
      model: opus
      effort: high
      budget_usd: 10.0
      chrome: true
      heartbeat_timeout_secs: 300
      max_turns: 80
      loop_max: 5
      rubber_duck_after: 2
      agent: builder
      system_prompt: |
        Executing sprint {{sprint.number}} of epic {{epic.code}}.
        Intent: {{epic.intent}}

        Project conventions:
        {{repo.claude_md}}

        {{previous_learnings}}

        Stories for this sprint:
        {{stories}}
      prompt: |
        Execute all stories for sprint {{sprint.number}} of epic {{epic.code}}.
        Groomed story details from previous ceremony:
        {{input}}

        For each story: implement, test, commit. Report what you did per story.

  - key: judge_code
    node_type: agent
    label: "Code Judge (mission progress)"
    always_run: true
    config:
      model: sonnet
      effort: medium
      budget_usd: 2.0
      chrome: false
      heartbeat_timeout_secs: 180
      max_turns: 20
      agent: code-judge
      system_prompt: |
        Judging sprint {{sprint.number}} of epic {{epic.code}}.
        Intent: {{epic.intent}}
        Success criteria: {{epic.success_criteria}}

        Project conventions:
        {{repo.claude_md}}
      prompt: |
        Evaluate the mission progress for sprint {{sprint.number}} of epic {{epic.code}}.

        Ceremony results so far:
        {{ceremony_results_json}}

        Assess:
        1. mission_progress (0-100%): How much of the epic intent is now satisfied?
        2. stories_completed: List of story codes that are done
        3. delta_stories: NEW stories discovered during this sprint (add to backlog)
        4. deploy_ready (bool): Is the code ready to deploy?
        5. intent_satisfied (bool): Is the full epic mission complete?

        Output your verdict as structured JSON with all five fields above.

  - key: gate_deploy
    node_type: gate
    label: "Deploy Ready?"
    config:
      gate_field: status
      gate_expect: completed

  - key: deploy_standby
    node_type: deploy
    label: "Deploy (Blue-Green)"
    config:
      deploy_app_id: "${DEPLOY_APP_ID}"
      deploy_timeout_secs: 300
      deploy_production_url: "${DEPLOY_PRODUCTION_URL}"

  - key: gate_deploy_ok
    node_type: gate
    label: "Deploy OK?"
    config:
      gate_field: status
      gate_expect: completed

  - key: judge_ab
    node_type: agent
    label: "A/B Judge (Chrome)"
    config:
      model: sonnet
      effort: medium
      budget_usd: 3.0
      chrome: true
      heartbeat_timeout_secs: 300
      max_turns: 20
      agent: ab-judge
      system_prompt: |
        Epic: {{epic.code}} — {{epic.title}}
        Intent: {{epic.intent}}
        Success criteria: {{epic.success_criteria}}

        {{deploy_output}}
      prompt: |
        A/B judge sprint {{sprint.number}} of epic {{epic.code}}.

        The code has been deployed to a STANDBY slot (not yet serving traffic).
        Compare the standby deployment against the live production version.
        Both should be accessible via their respective URLs.

        Ceremony results so far:
        {{ceremony_results_json}}

        Output your verdict as JSON. Set "promote": true to approve the swap.

  - key: gate_ab
    node_type: gate
    label: "A/B Approved?"
    config:
      gate_field: status
      gate_expect: completed

  - key: promote
    node_type: promote
    label: "Promote Standby → Primary"
    config:
      deploy_app_id: "${DEPLOY_APP_ID}"

  - key: merge_results
    node_type: merge
    label: "Collect Results"
    always_run: true
    config: {}

  - key: sm_retro
    node_type: harness
    label: "Scrum Master Retro"
    always_run: true
    config:
      model: sonnet
      effort: low
      budget_usd: 2.0
      chrome: false
      heartbeat_timeout_secs: 180
      max_turns: 15
      agent: scrum-master
      system_prompt: |
        Sprint {{sprint.number}} retro for {{epic.code}}.
      prompt: |
        Sprint {{sprint.number}} retro for {{epic.code}}.

        Ceremony results (structured):
        {{ceremony_results_json}}

        Supervisor decisions: {{supervisor_decisions}}

        Analyze: what went well, what caused friction, patterns to codify,
        discovered work items. Be specific — cite node names and costs.
        Output structured JSON retro.

  - key: output
    node_type: output
    label: "Sprint Result"
    config: {}

edges:
  # Sequential flow — no gates between research/groom/execute
  - source: source
    target: research
  - source: research
    target: groom
  - source: groom
    target: execute

  # Judge ALWAYS runs after execute (always_run: true)
  - source: execute
    target: judge_code

  # Deploy chain — conditional on judge saying code is ready
  - source: judge_code
    target: gate_deploy
  - source: gate_deploy
    target: deploy_standby
    handle: pass
  - source: gate_deploy
    target: merge_results
    handle: fail
  - source: deploy_standby
    target: gate_deploy_ok
  - source: gate_deploy_ok
    target: judge_ab
    handle: pass
  - source: gate_deploy_ok
    target: merge_results
    handle: fail
  - source: judge_ab
    target: gate_ab
  - source: gate_ab
    target: promote
    handle: pass
  - source: gate_ab
    target: merge_results
    handle: fail
  - source: promote
    target: merge_results

  # Retro ALWAYS runs — the learning loop is the moat
  - source: merge_results
    target: sm_retro
  - source: sm_retro
    target: output
